kind = "web"
previewPath = "/"
title = "Odoo Cafe POS"
version = "1.0.0"
id = "artifacts/cafe-pos"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18629

[services.development]
run = "pnpm --filter @workspace/cafe-pos run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/cafe-pos", "run", "build" ]
publicDir = "artifacts/cafe-pos/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18629"
BASE_PATH = "/"
